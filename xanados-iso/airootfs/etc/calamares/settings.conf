---
oem: true
disable-cancel: false
disable-back: false
instance-id: "XanadOS-Installer"
show-advanced: true
prompt-install: true
dont-chroot: false
secureboot: true
allow-encryption: true
modules-search: "/lib/calamares/modules"
sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
      - install
      - finished
