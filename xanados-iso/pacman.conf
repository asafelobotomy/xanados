# /etc/pacman.conf - XanadOS optimized configuration

[options]
# Cache directory to store downloaded packages
CacheDir = /var/cache/pacman/pkg/
# Keep only currently installed package versions
CleanMethod = KeepCurrent
# Number of package versions to keep (useful with CleanMethod)
CacheDirLevel = 2
# Total max size for cache (optional, uncomment to enable)
# CacheDirSizeLimit = 2048M
# Sync database and package download concurrency
ParallelDownloads = 5
# Color output
Color
# Total download progress display
TotalDownload
# Use a verbose package list during operations
VerbosePkgLists
# SigLevel to enforce package signature verification
SigLevel = Required DatabaseOptional

# Repository options
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[community]
Include = /etc/pacman.d/mirrorlist

# Uncomment or add custom repos below as needed
#[multilib]
#Include = /etc/pacman.d/mirrorlist

# Misc options
HoldPkg = pacman glibc linux-zen
