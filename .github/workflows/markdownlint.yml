# .github/workflows/markdownlint.yml
name: Markdown Lint

on:
  push:
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          globs: "**/*.md"
      - name: Install Atom
        run: sudo apt-get update && sudo apt-get install -y atom
      - name: Atom Markdown check
        run: |
          shopt -s globstar
          atom --check **/*.md
