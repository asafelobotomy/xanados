# .github/workflows/build.yml
name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install archiso
        run: sudo apt-get update && sudo apt-get install -y archiso
      - name: Build ISO
        run: bash scripts/build_iso.sh
